<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B4DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e0f7fa;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#grad)" />
  <!-- Washing Machine Body -->
  <rect x="116" y="106" width="280" height="300" rx="30" fill="#ffffff" />
  <!-- Washing Machine Panel -->
  <rect x="116" y="106" width="280" height="60" rx="30" fill="#f0f2f5" />
  <!-- Buttons -->
  <circle cx="160" cy="136" r="10" fill="#FF5252" />
  <circle cx="195" cy="136" r="10" fill="#4CAF50" />
  <!-- Dial -->
  <circle cx="340" cy="136" r="18" fill="#e0e0e0" />
  <circle cx="340" cy="136" r="10" fill="#9e9e9e" />
  <!-- Door Outer -->
  <circle cx="256" cy="276" r="90" fill="#e0e0e0" />
  <!-- Door Inner (Glass) -->
  <circle cx="256" cy="276" r="70" fill="#bbdefb" />
  <!-- Water Wave inside -->
  <path d="M 186 276 Q 221 256 256 276 T 326 276 A 70 70 0 0 1 186 276 Z" fill="#1976D2" opacity="0.8" />
  <path d="M 186 296 Q 221 276 256 296 T 326 296 A 70 70 0 0 1 186 296 Z" fill="#0D47A1" opacity="0.6" />
  <!-- Bubbles -->
  <circle cx="220" cy="240" r="12" fill="url(#bubbleGrad)" />
  <circle cx="270" cy="220" r="8" fill="url(#bubbleGrad)" />
  <circle cx="290" cy="250" r="15" fill="url(#bubbleGrad)" />
  <circle cx="240" cy="200" r="6" fill="url(#bubbleGrad)" />
</svg>
